<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家計簿</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="ledger-header">
        <h1 class="ledger-header__title">家計簿</h1>
        <p class="ledger-header__tagline">日々の収支を記録する</p>
    </header>

    <nav class="tab-bar" aria-label="画面切り替え">
        <button type="button" class="tab-bar__tab is-active" data-panel="panel-input">入力</button>
        <button type="button" class="tab-bar__tab" data-panel="panel-list">一覧</button>
        <button type="button" class="tab-bar__tab" data-panel="panel-report">レポート</button>
        <button type="button" class="tab-bar__tab" data-panel="panel-categories">カテゴリ</button>
    </nav>

    <main class="ledger-page">
        <section id="panel-input" class="panel is-active" aria-labelledby="panel-input-heading">
            <h2 id="panel-input-heading" class="visually-hidden">収支の入力</h2>

            <form id="tx-form" class="tx-form" novalidate>
                <div class="tx-form__type-toggle" role="radiogroup" aria-label="収入・支出の切り替え">
                    <label class="type-option type-option--expense">
                        <input type="radio" name="tx-type" value="expense" checked>
                        <span>支出</span>
                    </label>
                    <label class="type-option type-option--income">
                        <input type="radio" name="tx-type" value="income">
                        <span>収入</span>
                    </label>
                </div>

                <div class="field">
                    <label for="tx-date">日付</label>
                    <input type="date" id="tx-date" name="date" required>
                </div>

                <div class="field">
                    <label for="tx-amount">金額(円)</label>
                    <input type="number" id="tx-amount" name="amount" min="1" step="1" inputmode="numeric"
                        placeholder="0" required>
                </div>

                <div class="field">
                    <label for="tx-category">カテゴリ</label>
                    <select id="tx-category" name="category_id" required>
                        <option value="" disabled selected>選択してください</option>
                    </select>
                </div>

                <div class="field">
                    <label for="tx-memo">メモ(任意)</label>
                    <input type="text" id="tx-memo" name="memo" maxlength="200" placeholder="例: スーパーで食材">
                </div>

                <p id="tx-form-error" class="form-error" role="alert" hidden></p>

                <button type="submit" class="btn-primary">記帳する</button>
            </form>
        </section>

        <section id="panel-list" class="panel" aria-labelledby="panel-list-heading" hidden>
            <h2 id="panel-list-heading" class="visually-hidden">収支の一覧</h2>

            <div class="list-filter">
                <label for="list-month">
                    <span class="visually-hidden">表示する月</span>
                    <input type="month" id="list-month">
                </label>
            </div>

            <dl id="list-summary" class="list-summary" aria-live="polite">
                <div class="list-summary__item list-summary__item--income">
                    <dt>収入</dt>
                    <dd id="summary-income">¥0</dd>
                </div>
                <div class="list-summary__item list-summary__item--expense">
                    <dt>支出</dt>
                    <dd id="summary-expense">¥0</dd>
                </div>
                <div class="list-summary__item list-summary__item--balance">
                    <dt>収支</dt>
                    <dd id="summary-balance">¥0</dd>
                </div>
            </dl>

            <ul id="transaction-list" class="ledger-list" aria-live="polite">
                <li class="ledger-list__empty">まだ記録がありません</li>
            </ul>
        </section>

        <section id="panel-report" class="panel" aria-labelledby="panel-report-heading" hidden>
            <h2 id="panel-report-heading" class="visually-hidden">月次集計</h2>

            <div class="list-filter">
                <label for="report-month">
                    <span class="visually-hidden">集計する月</span>
                    <input type="month" id="report-month">
                </label>
            </div>

            <dl id="report-summary" class="list-summary" aria-live="polite">
                <div class="list-summary__item list-summary__item--income">
                    <dt>収入</dt>
                    <dd id="report-income">¥0</dd>
                </div>
                <div class="list-summary__item list-summary__item--expense">
                    <dt>支出</dt>
                    <dd id="report-expense">¥0</dd>
                </div>
                <div class="list-summary__item list-summary__item--balance">
                    <dt>収支</dt>
                    <dd id="report-balance">¥0</dd>
                </div>
            </dl>

            <h3 class="report-breakdown__heading">カテゴリ別内訳</h3>
            <ul id="report-breakdown" class="report-breakdown" aria-live="polite">
                <li class="ledger-list__empty">この月のデータはまだありません</li>
            </ul>
        </section>

        <section id="panel-categories" class="panel" aria-labelledby="panel-categories-heading" hidden>
            <h2 id="panel-categories-heading" class="visually-hidden">カテゴリ管理</h2>

            <form id="category-form" class="category-form" novalidate>
                <div class="field">
                    <label for="category-name">カテゴリ名</label>
                    <input type="text" id="category-name" name="name" maxlength="50" placeholder="例: 食費" required>
                </div>

                <div class="tx-form__type-toggle" role="radiogroup" aria-label="収入用・支出用の切り替え">
                    <label class="type-option type-option--expense">
                        <input type="radio" name="category-type" value="expense" checked>
                        <span>支出用</span>
                    </label>
                    <label class="type-option type-option--income">
                        <input type="radio" name="category-type" value="income">
                        <span>収入用</span>
                    </label>
                </div>

                <p id="category-form-error" class="form-error" role="alert" hidden></p>

                <button type="submit" class="btn-secondary">カテゴリを追加</button>
            </form>

            <ul id="category-list" class="category-list"></ul>
        </section>
    </main>

    <p id="toast" class="toast" role="status" hidden></p>

    <script src="js/api.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
